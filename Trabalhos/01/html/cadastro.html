<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/cadastro.css" />

</head>
<body>

  <header>
    <nav class="navbar">
      <h1 class="titulo"><span style="color: white;">🎬 Mundo</span>DasTelas</h1>

      <input type="checkbox" id="menu-toggle">
      <label for="menu-toggle" class="menu-icon">&#9776;</label>

      <ul class="nav-menu">
        <li><a href="Inicio.html">Início</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="filmes.html">Filmes</a></li>
        <li><a href="series.html">Séries</a></li>

      </ul>
    </nav>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main-login">
    <div class="conteudo">
      <div class="form-container">
        <h1>Formulário de Cadastro</h1>
        <form action="/submit" method="post">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" required>

          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required>

          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" required>

          <label for="confirmar-senha">Confirmar Senha:</label>
          <input type="password" id="confirmar-senha" name="confirmar-senha" required>

          <div class="buttons">
            <button type="submit">Cadastrar</button>
            <button type="reset">Limpar</button>
            <button type="button" class="btn-voltar" onclick="location.href='login.html'">Voltar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- RODAPÉ -->
  <footer class="footer">
    <div class="footer-content">
      <p>© 2025 Mundo das Telas. Todos os direitos reservados.</p>
      <p>Projeto desenvolvido por Lucas, Miguel e Hudson</p>

        <li><a href="#">Privacidade</a></li>
      </ul>
    </div>
  </footer>

</body>
</html>
