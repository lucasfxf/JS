<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Validação Simples</title>
</head>
<body>
  <h1>Formulário de Login</h1>

  <form id="meuFormulario">
    <label>Nome:</label>
    <input type="text" id="nome" placeholder="Digite seu nome">
    <br><br>
    <button type="submit">Enviar</button>
  </form>

  <p id="resultado"></p>

  <script>
    document.getElementById("meuFormulario").addEventListener("submit", function(e) {
      e.preventDefault(); // impede o envio automático

      let nome = document.getElementById("nome").value;

      if (nome === "") {
        document.getElementById("resultado").innerText = "⚠️ O campo nome é obrigatório!";
      } else {
        document.getElementById("resultado").innerText = "✅ Formulário enviado com sucesso!";
        // aqui você poderia usar: e.target.submit() para enviar manualmente
      }
    });
  </script>
</body>
</html>
